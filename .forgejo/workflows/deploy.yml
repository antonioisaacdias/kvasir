# .forgejo/workflows/deploy.yml
name: deploy
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: host
    steps:
      - uses: actions/checkout@v4

      - name: SonarQube scan
        continue-on-error: true
        run: |
          docker run --rm \
            --env-file /home/odin/sonar-scanner/kvasir.env \
            -v "$(pwd):/usr/src:ro" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.working.directory=/tmp/scannerwork \
            -Dsonar.scm.disabled=true

      - name: Build image
        run: docker build -t kvasir:latest .

      - name: Save image
        run: docker save kvasir:latest | gzip > /tmp/kvasir.tar.gz

      - name: Ship image to truenas and load it
        run: |
          scp /tmp/kvasir.tar.gz truenas:/tmp/kvasir.tar.gz
          ssh truenas 'gunzip -c /tmp/kvasir.tar.gz | sudo docker load'

      - name: Update Custom App
        run: |
          scp compose.yaml truenas:/tmp/kvasir-compose.yaml
          ssh truenas 'sudo midclt call app.update kvasir "$(python3 -c "import json; print(json.dumps({\"custom_compose_config_string\":open(\"/tmp/kvasir-compose.yaml\").read()}))")"'
